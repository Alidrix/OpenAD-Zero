name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openadzero
          POSTGRES_PASSWORD: openadzero
          POSTGRES_DB: openadzero_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openadzero -d openadzero_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://openadzero:openadzero@localhost:5432/openadzero_test
      REDIS_URL: redis://localhost:6379/0
      OPENADZERO_AUTO_CREATE_TABLES: "false"
      OPENADZERO_RUN_MIGRATIONS_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run backend tests
        working-directory: backend
        run: pytest
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
  docker-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Create env file
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Run migrations
        run: make migrate
      - name: Seed demo
        run: make seed-demo
      - name: Smoke tests
        run: make smoke
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
      - name: Shutdown
        if: always()
        run: docker compose down -v
