name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openadzero
          POSTGRES_PASSWORD: openadzero
          POSTGRES_DB: openadzero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openadzero -d openadzero_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://openadzero:openadzero@localhost:5432/openadzero_test
      REDIS_URL: redis://localhost:6379/0
      EVIDENCE_DIR: ${{ runner.temp }}/openadzero-evidence
      TESTING: "true"
      OPENADZERO_AUTO_CREATE_TABLES: "false"
      OPENADZERO_RUN_MIGRATIONS_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Check version file
        run: test -s VERSION
      - name: Check changelog
        run: test -s CHANGELOG.md
      - name: Check release notes
        run: test -s docs/releases/v0.1.0-rc1.md
      - name: Release check script syntax
        run: bash -n scripts/release-check.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare evidence directory
        run: |
          mkdir -p "$EVIDENCE_DIR"
          chmod 700 "$EVIDENCE_DIR"
      - name: Install backend dependencies
        run: python -m pip install -e "backend[test]"
      - name: Backend lint
        run: cd backend && ruff check app tests
      - name: Backend format check
        run: cd backend && ruff format --check app tests
      - name: Run backend tests
        run: cd backend && pytest
      - name: Security check
        run: ./scripts/security-check.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Create env file
        run: cp .env.example .env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Run migrations
        run: make migrate
      - name: Smoke
        run: make smoke
      - name: E2E smoke
        run: make e2e
      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs
      - name: Shutdown
        if: always()
        run: docker compose down -v

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
