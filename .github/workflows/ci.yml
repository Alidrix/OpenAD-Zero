name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openadzero
          POSTGRES_PASSWORD: openadzero
          POSTGRES_DB: openadzero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openadzero -d openadzero_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://openadzero:openadzero@localhost:5432/openadzero_test
      REDIS_URL: redis://localhost:6379/0
      EVIDENCE_DIR: ${{ runner.temp }}/openadzero-evidence
      TESTING: "true"
      OPENADZERO_AUTO_CREATE_TABLES: "false"
      OPENADZERO_RUN_MIGRATIONS_ON_STARTUP: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare evidence directory
        run: |
          mkdir -p "$EVIDENCE_DIR"
          chmod 700 "$EVIDENCE_DIR"
      - name: Install backend dependencies
        run: python -m pip install -e 'backend[test]'
      - name: Run backend tests
        run: cd backend && pytest
