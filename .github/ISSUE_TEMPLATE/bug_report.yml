name: Bug report
description: Report a reproducible problem in OpenAD Zero.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes: {label: Summary}
    validations: {required: true}
  - type: textarea
    id: environment
    attributes: {label: Environment, description: OS, Docker, browser, OpenAD Zero version.}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Steps to reproduce}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: actual
    attributes: {label: Actual behavior}
    validations: {required: true}
  - type: textarea
    id: logs
    attributes: {label: Logs, render: shell}
  - type: textarea
    id: screenshots
    attributes: {label: Screenshots}
  - type: textarea
    id: security-impact
    attributes: {label: Security impact, description: Describe any safety, secret exposure, evidence path, or scan-scope impact.}
