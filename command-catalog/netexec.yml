actions:
  netexec_smb_fingerprint:
    purpose: Identifier les hôtes SMB/Windows et enrichir les informations découvertes par Nmap.
    risk_level: 2
    requires_approval: true
    execution_mode: backend
    command_template: ["nxc", "smb", "<targets>", "--log", "<log_path>"]
  netexec_smb_signing_check:
    purpose: Identifier les hôtes pour lesquels SMB signing n’est pas requis sans lancer de relay.
    risk_level: 2
    requires_approval: true
    execution_mode: backend
    command_template: ["nxc", "smb", "<targets>", "--gen-relay-list", "<relay_list_path>", "--log", "<log_path>"]
  netexec_smb_null_session_check:
    purpose: Tester uniquement si une null session SMB est possible.
    risk_level: 2
    requires_approval: true
    execution_mode: backend
    command_template: ["nxc", "smb", "<targets>", "-u", "", "-p", "", "--log", "<log_path>"]
  netexec_smb_null_session_shares:
    purpose: Lister les partages accessibles anonymement sans spidering ni téléchargement.
    risk_level: 2
    requires_approval: true
    execution_mode: backend
    command_template: ["nxc", "smb", "<targets>", "-u", "", "-p", "", "--shares", "--log", "<log_path>"]
