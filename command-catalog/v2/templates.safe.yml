- id: v2_nmap_safe_discovery_preview
  tool_id: nmap_safe_discovery
  name: Nmap safe discovery preview
  description: Prepare a lightweight service discovery preview for one validated in-scope target.
  category: discovery
  risk_level: low
  mode: preview_only
  requires_human_approval: true
  requires_terms_acceptance: false
  template_ref: nmap_safe_discovery
  expected_inputs:
    - target
  expected_outputs:
    - scan
  recommendation_signals:
    - host_discovered
  safety_notes:
    - Backend must rebuild argv from the allowlisted template.
    - Frontend must never send raw commands.
    - This V2 slice never executes Nmap.
- id: v2_netexec_smb_fingerprint_preview
  tool_id: netexec_smb_fingerprint
  name: NetExec SMB fingerprint preview
  description: Prepare a read-only SMB fingerprint preview for validated in-scope hosts.
  category: smb_review
  risk_level: low
  mode: preview_only
  requires_human_approval: true
  requires_terms_acceptance: false
  template_ref: netexec_smb_fingerprint
  expected_inputs:
    - target
  expected_outputs:
    - smb_fingerprint
  recommendation_signals:
    - smb_open
    - windows_host_detected
  safety_notes:
    - Backend must rebuild argv from the allowlisted template.
    - Frontend must never send raw commands.
    - No authentication, spraying, dumping, or command execution.
    - This V2 slice never executes NetExec.
