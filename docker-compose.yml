services:
  openadzero-postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openadzero
      POSTGRES_USER: openadzero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-dev-postgres}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openadzero -d openadzero"]
      interval: 10s
      timeout: 5s
      retries: 5
  openadzero-redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  openadzero-api:
    restart: unless-stopped
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://openadzero:${POSTGRES_PASSWORD:-change-me-dev-postgres}@openadzero-postgres:5432/openadzero
      REDIS_URL: redis://openadzero-redis:6379/0
      EVIDENCE_DIR: /app/evidence
      APP_UID: "10001"
      APP_GID: "10001"
      HOME: /app/runtime/home
      XDG_CONFIG_HOME: /app/runtime/config
      XDG_CACHE_HOME: /app/runtime/cache
      XDG_DATA_HOME: /app/runtime/data
      TMPDIR: /app/runtime/tmp
      NXC_PATH: /app/runtime/home/.nxc
      OPENADZERO_ENV: ${OPENADZERO_ENV:-dev}
      OPENADZERO_API_TOKEN_FILE: ${OPENADZERO_API_TOKEN_FILE:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
      NETEXEC_HOME: /app/runtime/nxc
    ports: ['8000:8000']
    # Named volume is recommended to avoid host bind-mount permission issues.
    # Use a local override with ./evidence:/app/evidence only when you need exported artifacts.
    volumes:
      - openadzero-evidence:/app/evidence
      - openadzero-runtime:/app/runtime
    depends_on:
      openadzero-postgres:
        condition: service_healthy
      openadzero-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
  openadzero-worker:
    restart: unless-stopped
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://openadzero:${POSTGRES_PASSWORD:-change-me-dev-postgres}@openadzero-postgres:5432/openadzero
      REDIS_URL: redis://openadzero-redis:6379/0
      EVIDENCE_DIR: /app/evidence
      APP_UID: "10001"
      APP_GID: "10001"
      HOME: /app/runtime/home
      XDG_CONFIG_HOME: /app/runtime/config
      XDG_CACHE_HOME: /app/runtime/cache
      XDG_DATA_HOME: /app/runtime/data
      TMPDIR: /app/runtime/tmp
      NXC_PATH: /app/runtime/home/.nxc
      OPENADZERO_ENV: ${OPENADZERO_ENV:-dev}
      OPENADZERO_API_TOKEN_FILE: ${OPENADZERO_API_TOKEN_FILE:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
      NETEXEC_HOME: /app/runtime/nxc
    command: ["python", "-m", "app.worker"]
    # Named volume is recommended to avoid host bind-mount permission issues.
    # Use a local override with ./evidence:/app/evidence only when you need exported artifacts.
    volumes:
      - openadzero-evidence:/app/evidence
      - openadzero-runtime:/app/runtime
    depends_on:
      openadzero-postgres:
        condition: service_healthy
      openadzero-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck_worker"]
      interval: 15s
      timeout: 5s
      retries: 5
  openadzero-ui:
    restart: unless-stopped
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports: ['5173:5173']
    depends_on:
      openadzero-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
  bloodhound-postgres:
    image: postgres:16-alpine
    profiles: ["bloodhound"]
    environment:
      POSTGRES_USER: ${BLOODHOUND_POSTGRES_USER:-bloodhound}
      POSTGRES_PASSWORD: ${BLOODHOUND_POSTGRES_PASSWORD:-change-me-bloodhound}
      POSTGRES_DB: ${BLOODHOUND_POSTGRES_DB:-bloodhound}
    volumes: [bloodhound-postgres-data:/var/lib/postgresql/data]
  bloodhound-neo4j:
    image: neo4j:4.4-community
    profiles: ["bloodhound"]
    environment:
      NEO4J_AUTH: ${BLOODHOUND_NEO4J_AUTH:-neo4j/change-me-neo4j}
    volumes: [bloodhound-neo4j-data:/data]
  bloodhound:
    image: specterops/bloodhound:latest
    profiles: ["bloodhound"]
    environment:
      BLOODHOUND_POSTGRES_CONNECTION: postgresql://${BLOODHOUND_POSTGRES_USER:-bloodhound}:${BLOODHOUND_POSTGRES_PASSWORD:-change-me-bloodhound}@bloodhound-postgres:5432/${BLOODHOUND_POSTGRES_DB:-bloodhound}
      NEO4J_CONNECTION: bolt://bloodhound-neo4j:7687
      NEO4J_AUTH: ${BLOODHOUND_NEO4J_AUTH:-neo4j/change-me-neo4j}
    ports: ['8080:8080']
    depends_on: [bloodhound-postgres, bloodhound-neo4j]
volumes:
  openadzero-evidence:
  openadzero-runtime:
  postgres-data:
  bloodhound-postgres-data:
  bloodhound-neo4j-data:
