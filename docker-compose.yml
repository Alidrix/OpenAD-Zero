services:
  openadzero-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openadzero
      POSTGRES_USER: openadzero
      POSTGRES_PASSWORD: openadzero
    volumes: [postgres-data:/var/lib/postgresql/data]
  openadzero-redis:
    image: redis:7-alpine
  openadzero-api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://openadzero:openadzero@openadzero-postgres:5432/openadzero
      REDIS_URL: redis://openadzero-redis:6379/0
      EVIDENCE_DIR: /app/evidence
    ports: ['8000:8000']
    volumes: ['./evidence:/app/evidence']
    depends_on: [openadzero-postgres, openadzero-redis]
  openadzero-worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://openadzero:openadzero@openadzero-postgres:5432/openadzero
      REDIS_URL: redis://openadzero-redis:6379/0
      EVIDENCE_DIR: /app/evidence
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./evidence:/app/evidence
    depends_on:
      - openadzero-postgres
      - openadzero-redis
  openadzero-ui:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports: ['5173:5173']
    depends_on: [openadzero-api]
volumes:
  postgres-data:
